version: 2

seeds:
  - name: current_channel
    description: "Current state of channel/subchannel taxonomy. Edit this CSV to update classifications."
    config:
      schema: reference
      column_types:
        channel_id: integer
        channel_type: varchar(50)
        subchannel_type: varchar(50)
        description: varchar(255)
        updated_by: varchar(100)

  - name: current_product
    description: "Current state of product taxonomy."
    config:
      schema: reference
      column_types:
        product_id: integer
        product_type: varchar(100)
        product_category: varchar(50)
        description: varchar(255)
        updated_by: varchar(100)

  - name: current_revenue_type
    description: "Current state of revenue type taxonomy."
    config:
      schema: reference
      column_types:
        revenue_type_id: integer
        revenue_type: varchar(50)
        description: varchar(255)
        updated_by: varchar(100)
